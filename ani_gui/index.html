<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ani-gui</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a1a1a'/%3E%3Cpath d='M12 9l12 7-12 7z' fill='%2300d4aa'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface-2: #202020;
    --border: #2a2a2a;
    --border-strong: #3a3a3a;
    --text: #f0f0f0;
    --muted: #8a8a8a;
    --faint: #5f5f5f;
    --accent: #00d4aa;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 ui-sans-serif, -apple-system, "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 28px 20px 64px; }

  header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; }
  header h1 { font-size: 17px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  header span { color: var(--faint); font-size: 13px; }

  .bar { display: flex; gap: 8px; margin-bottom: 8px; }
  input[type=text] {
    flex: 1; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 14px; outline: none;
  }
  input[type=text]:focus { border-color: var(--border-strong); }
  select, button {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 13px; cursor: pointer; outline: none;
  }
  button:hover, select:hover { border-color: var(--border-strong); }
  button.primary { background: var(--accent); color: #06231d; border-color: var(--accent); font-weight: 600; }
  button.primary:hover { filter: brightness(1.06); }
  button:disabled { opacity: .5; cursor: default; }

  .hint { color: var(--faint); font-size: 12px; margin: 4px 0 16px; }

  .tabs { display: flex; gap: 18px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
  .tab {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--muted); padding: 8px 2px; font-size: 13px; cursor: pointer; border-radius: 0;
  }
  .tab:hover { color: var(--text); border-color: transparent; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  .list { display: flex; flex-direction: column; gap: 6px; }
  .item {
    display: flex; align-items: center; gap: 12px; padding: 9px 11px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer;
  }
  .item:hover { background: var(--surface-2); }
  .item.active { border-color: var(--accent); }
  .item.expanded {
    flex-wrap: wrap; border-color: var(--accent);
    padding-bottom: 4px;
  }
  .item.expanded .detail-panel { width: 100%; margin-top: 4px; }
  .detail-panel .panel {
    background: none; border: none; padding: 8px 0 4px; margin: 0;
  }
  .detail-panel .actions { margin-top: 12px; }
  .detail-panel .eps { margin-bottom: 4px; }
  .item .name { font-weight: 500; flex: 1; }
  .item .meta { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .cover {
    width: 38px; height: 52px; flex: none; object-fit: cover;
    border-radius: 5px; background: var(--surface-2); border: 1px solid var(--border);
  }
  .cover.lg { width: 64px; height: 88px; border-radius: 6px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .card {
    display: flex; gap: 12px; padding: 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px;
  }
  .card .body { display: flex; flex-direction: column; min-width: 0; flex: 1; }
  .card .title { font-weight: 500; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .card .prog { color: var(--muted); font-size: 12px; margin: 4px 0 10px; }
  .card button { margin-top: auto; align-self: flex-start; padding: 7px 11px; font-size: 12px; }

  .panel {
    margin-top: 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .panel h2 { font-size: 14px; font-weight: 600; margin: 0 0 2px; }
  .panel .sub { color: var(--muted); font-size: 12px; margin-bottom: 14px; }

  .eps { display: flex; flex-wrap: wrap; gap: 6px; }
  .ep {
    min-width: 40px; text-align: center; padding: 7px 9px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text);
  }
  .ep:hover { border-color: var(--border-strong); }
  .ep.sel { background: var(--accent); color: #06231d; border-color: var(--accent); font-weight: 600; }

  .actions { display: flex; align-items: center; gap: 10px; margin-top: 16px; }
  .status { color: var(--muted); font-size: 12px; min-height: 16px; margin-top: 12px; }
  .status.err { color: #ff7a7a; }
  .status.ok { color: var(--accent); }
  .status.work { color: var(--text); }
  .empty { color: var(--faint); font-size: 13px; padding: 24px 4px; }
  .spin { color: var(--faint); font-size: 13px; padding: 16px 4px; }

  .banner {
    display: none; align-items: flex-start; gap: 10px; margin-bottom: 16px;
    padding: 11px 13px; border: 1px solid var(--border-strong);
    border-radius: 8px; background: var(--surface); font-size: 13px;
  }
  .banner.show { display: flex; }
  .banner.warn { border-color: #5a4a1f; }
  .banner code {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 5px; padding: 1px 6px; font-size: 12px;
  }
  .banner .x {
    margin-left: auto; color: var(--faint); cursor: pointer;
    border: none; background: none; padding: 0 2px; font-size: 15px;
  }
  footer {
    margin-top: 40px; padding-top: 14px; border-top: 1px solid var(--border);
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
    color: var(--faint); font-size: 12px;
  }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--text); }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: 5px; }
  .dot.ok { background: var(--accent); }
  .dot.bad { background: #c46; }

  .prog-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .prog-bar .fill {
    height: 100%; width: 40%; background: var(--accent); border-radius: 2px;
    animation: prog-slide 1.4s ease-in-out infinite;
  }
  .prog-bar .fill.det {
    animation: none; transform: none; transition: width .8s linear;
  }
  @keyframes prog-slide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(250%); }
  }
  .meta.failed { color: #ff7a7a; }
  .dl-note { color: #ff7a7a; font-size: 11px; margin-top: 4px; }

  @media (max-width: 640px) {
    .wrap { padding: 16px 12px 48px; }

    header { flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    header h1 { font-size: 16px; }

    .bar {
      flex-wrap: wrap;
      gap: 6px;
    }
    .bar input[type=text] {
      flex: 1 1 100%; width: 100%; min-width: 0;
    }
    .bar select, .bar button {
      flex: 1 1 auto; min-width: 0; font-size: 12px; padding: 8px 10px;
    }

    .tabs { gap: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab { font-size: 12px; white-space: nowrap; padding: 8px 1px; }

    .cards { grid-template-columns: 1fr; }

    .item { padding: 10px; gap: 10px; }
    .item.expanded { padding-bottom: 6px; }
    .item .meta { font-size: 11px; }

    .cover { width: 32px; height: 44px; }
    .cover.lg { width: 48px; height: 66px; }

    .panel { padding: 12px; }
    .panel h2 { font-size: 13px; }
    .panel .actions, .detail-panel .actions { flex-wrap: wrap; gap: 6px; }
    .panel .actions select, .panel .actions button,
    .detail-panel .actions select, .detail-panel .actions button { flex: 1 1 auto; min-width: 0; font-size: 12px; padding: 8px 10px; }

    .eps { gap: 4px; }
    .ep { min-width: 34px; padding: 6px 7px; font-size: 12px; }

    footer { flex-direction: column; gap: 6px; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>ani-gui</h1>
    <span>front-end for ani-cli</span>
  </header>

  <div class="banner" id="banner">
    <div id="bannerText"></div>
    <button class="x" id="bannerClose" title="Dismiss">×</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="search">Search</button>
    <button class="tab" data-tab="continue">Continue Watching</button>
    <button class="tab" data-tab="for-you">For You</button>
    <button class="tab" data-tab="downloads">Downloads</button>
  </div>

  <div id="searchView">
    <form class="bar" id="searchForm">
      <input type="text" id="q" placeholder="Search anime…" autocomplete="off" autofocus>
      <select id="mode" title="Language">
        <option value="sub">Sub</option>
        <option value="dub">Dub</option>
      </select>
      <select id="player" title="Player">
        <option value="default">Default player</option>
        <option value="vlc">VLC</option>
      </select>
      <button type="submit">Search</button>
    </form>
    <div class="hint">Pick a series, choose an episode, then play. Playback opens in your chosen player.</div>

    <div id="results" class="list"></div>
  </div>

  <div id="continueView" style="display:none">
    <div class="hint">Resumes the next episode from ani-cli's watch history.</div>
    <div id="continueList"></div>
  </div>

  <div id="forYouView" style="display:none">
    <div class="hint">Anime you might like, based on what you've watched.</div>
    <div id="forYouList"></div>
  </div>

  <div id="downloadsView" style="display:none">
    <div class="hint">Episodes you've asked ani-gui to download via ani-cli.</div>
    <div class="bar" style="margin-bottom:14px">
      <input type="text" id="dlDir" placeholder="Download directory (default: current dir)" autocomplete="off">
      <button id="dlDirBrowse">Browse</button>
      <button id="dlDirSave">Save</button>
    </div>
    <div id="downloadsList"></div>
  </div>

  <footer id="footer">
    <span id="verInfo">ani-gui</span>
    <span id="health"></span>
    <a href="/docs">Docs</a>
    <a href="https://github.com/pystardust/ani-cli" target="_blank" rel="noreferrer">ani-cli</a>
  </footer>
</div>

<script>
const $ = s => document.querySelector(s);
const state = { mode: "sub", player: "default", selected: null, ep: null };

const coverImg = (src, cls="cover") =>
  src ? `<img class="${cls}" src="${src}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.visibility='hidden'">`
      : `<span class="${cls}"></span>`;

// tabs
document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  t.classList.add("active");
  const tab = t.dataset.tab;
  $("#searchView").style.display = tab === "search" ? "" : "none";
  $("#continueView").style.display = tab === "continue" ? "" : "none";
  $("#forYouView").style.display = tab === "for-you" ? "" : "none";
  $("#downloadsView").style.display = tab === "downloads" ? "" : "none";
  if (tab === "continue") loadContinue();
  if (tab === "for-you") loadForYou();
  if (tab === "downloads") loadDownloads();
  else { if (_downloadsPoll) { clearTimeout(_downloadsPoll); _downloadsPoll = null; } }
}));

$("#mode").addEventListener("change", e => {
  state.mode = e.target.value;
  _forYouCache = null;  // bust cache — mode affects available titles
  if ($("#q").value.trim()) runSearch();
});

$("#player").addEventListener("change", e => { state.player = e.target.value; });

$("#dlDirSave").addEventListener("click", async () => {
  const dir = $("#dlDir").value.trim();
  const btn = $("#dlDirSave");
  btn.disabled = true;
  try {
    await fetch("/api/settings", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({download_dir: dir}),
    });
    btn.textContent = "Saved";
    setTimeout(() => { btn.textContent = "Save"; btn.disabled = false; }, 1500);
  } catch (_) {
    btn.textContent = "Error";
    btn.disabled = false;
  }
});

$("#dlDirBrowse").addEventListener("click", async () => {
  const btn = $("#dlDirBrowse");
  btn.disabled = true;
  btn.textContent = "…";
  try {
    const r = await fetch("/api/browse-dir");
    const d = await r.json();
    if (d.path) {
      $("#dlDir").value = d.path;
      $("#dlDirSave").click();  // auto-save
    }
  } catch (_) {}
  btn.textContent = "Browse";
  btn.disabled = false;
});

$("#bannerClose").addEventListener("click", () => $("#banner").classList.remove("show"));

function showBanner(html, warn) {
  $("#bannerText").innerHTML = html;
  const b = $("#banner");
  b.className = "banner show" + (warn ? " warn" : "");
}

async function loadVersion() {
  try {
    const v = await (await fetch("/api/version")).json();
    const c = v.ani_cli;
    $("#verInfo").textContent =
      `ani-gui ${v.ani_gui} · ani-cli ${c.installed || "not found"}`;

    if (!c.installed) {
      $("#health").innerHTML = `<span class="dot bad"></span>ani-cli missing`;
    } else if (!v.has_player) {
      $("#health").innerHTML = `<span class="dot bad"></span>no player found`;
    } else {
      $("#health").innerHTML = `<span class="dot ok"></span>ready`;
    }

    // Show the most important message.  Errors first, then updates.
    if (!c.installed) {
      showBanner("<b>ani-cli isn't installed or isn't on PATH.</b> Install it from " +
        `<a href="https://github.com/pystardust/ani-cli" target="_blank" rel="noreferrer">github.com/pystardust/ani-cli</a>, then reload.`, true);
    } else if (!v.has_player) {
      showBanner("<b>No video player found.</b> Install <code>mpv</code> or <code>iina</code> to watch.", true);
    } else if (v.ani_gui_update) {
      const method = v.install_method || "";
      const cmd = method === "brew" ? "brew upgrade rickwiththeportalgun/tap/ani-gui"
                : method === "pip"  ? "pip3 install --upgrade ani-gui"
                : method === "pipx" ? "pipx upgrade ani-gui"
                : method === "source" ? "git -C $(dirname $(python3 -c 'import ani_gui;print(ani_gui.__file__)')/../..) pull"
                : "pipx upgrade ani-gui";
      showBanner(`<b>ani-gui ${v.ani_gui} → ${v.ani_gui_latest} available.</b> ` +
        `Update with <code>${cmd}</code>`, false);
    } else if (c.update_available) {
      const acliMethod = v.install_method === "brew"
        ? "brew upgrade ani-cli" : "ani-cli -U";
      showBanner(`<b>ani-cli ${c.installed} → ${c.latest} available.</b> ` +
        `Update with <code>${acliMethod}</code>`, false);
    }
  } catch (_) { /* footer just stays minimal */ }
}
loadVersion();

$("#searchForm").addEventListener("submit", e => { e.preventDefault(); runSearch(); });

async function runSearch() {
  const q = $("#q").value.trim();
  state.selected = null; state.ep = null;
  if (!q) { $("#results").innerHTML = ""; return; }
  $("#results").innerHTML = `<div class="spin">Searching…</div>`;
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&mode=${state.mode}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    renderResults(d.results);
  } catch (err) {
    $("#results").innerHTML = `<div class="empty">Error: ${err.message}</div>`;
  }
}

function renderResults(results) {
  if (!results.length) { $("#results").innerHTML = `<div class="empty">No results.</div>`; return; }
  $("#results").innerHTML = "";
  for (const a of results) {
    const el = document.createElement("div");
    el.className = "item";
    const meta = state.mode === "dub" ? `${a.dub} dub` : `${a.sub} eps`;
    el.innerHTML = `${coverImg(a.thumbnail)}<span class="name"></span><span class="meta">${meta}</span>`;
    el.querySelector(".name").textContent = a.name;
    el.addEventListener("click", () => selectShow(a, el));
    $("#results").appendChild(el);
  }
}

async function selectShow(a, el) {
  // Collapse any previously-expanded item.
  const prev = document.querySelector(".item.expanded");
  if (prev && prev !== el) {
    prev.classList.remove("expanded", "active");
    const prevPanel = prev.querySelector(".detail-panel");
    if (prevPanel) prevPanel.remove();
  }

  // If clicking the already-expanded item, collapse it.
  if (el.classList.contains("expanded")) {
    el.classList.remove("expanded", "active");
    const panel = el.querySelector(".detail-panel");
    if (panel) panel.remove();
    state.selected = null; state.ep = null;
    return;
  }

  el.classList.add("active", "expanded");
  state.selected = a; state.ep = null;

  // Inject a loading placeholder into the item.
  const existing = el.querySelector(".detail-panel");
  if (existing) existing.remove();
  const loader = document.createElement("div");
  loader.className = "detail-panel";
  loader.innerHTML = `<div class="spin">Loading episodes…</div>`;
  el.appendChild(loader);

  try {
    const r = await fetch(`/api/episodes?id=${encodeURIComponent(a.id)}&mode=${state.mode}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    renderDetail(a, d.episodes, el);
  } catch (err) {
    loader.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
  }
}

function renderDetail(a, episodes, el) {
  const panel = el.querySelector(".detail-panel");
  panel.innerHTML = `
    <div class="panel">
      <div class="eps"></div>
      <div class="actions">
        <select class="quality-select" title="Quality">
          <option value="best">Best</option>
          <option value="1080">1080p</option>
          <option value="720">720p</option>
          <option value="480">480p</option>
          <option value="worst">Worst</option>
        </select>
        <button class="primary play-btn" disabled>Play</button>
        <button class="dl-btn" disabled>Download</button>
        <button class="dl-all-btn" disabled title="Download every episode">Download All</button>
      </div>
      <div class="status" style="min-height:16px"></div>
    </div>`;

  // Stop clicks inside the detail panel from collapsing the item.
  panel.addEventListener("click", e => e.stopPropagation());

  const status = panel.querySelector(".status");
  const playBtn = panel.querySelector(".play-btn");
  const dlBtn = panel.querySelector(".dl-btn");
  const dlAllBtn = panel.querySelector(".dl-all-btn");

  const epsBox = panel.querySelector(".eps");
  if (!episodes.length) {
    epsBox.innerHTML = `<span class="empty">No episodes available.</span>`;
  }
  for (const ep of episodes) {
    const b = document.createElement("div");
    b.className = "ep";
    b.textContent = ep;
    b.addEventListener("click", (e) => {
      e.stopPropagation();
      epsBox.querySelectorAll(".ep").forEach(x => x.classList.remove("sel"));
      b.classList.add("sel");
      state.ep = ep;
      playBtn.disabled = false;
      dlBtn.disabled = false;
      dlAllBtn.disabled = false;
    });
    epsBox.appendChild(b);
  }

  playBtn.addEventListener("click", (e) => { e.stopPropagation(); doPlay({panel, status, playBtn, dlBtn}, false); });
  dlBtn.addEventListener("click", (e) => { e.stopPropagation(); doPlay({panel, status, playBtn, dlBtn}, true); });
  dlAllBtn.addEventListener("click", (e) => { e.stopPropagation(); downloadAll({panel, status, playBtn, dlBtn, dlAllBtn}, episodes); });
}

async function doPlay(els, download) {
  const { status, playBtn, dlBtn } = els;
  if (state.ep == null) {
    status.className = "status err"; status.textContent = "Pick an episode first."; return;
  }
  setStatus(status, "work", download
    ? `Asking ani-cli to download episode ${state.ep}…`
    : `Resolving episode ${state.ep} via ani-cli (finding a working source)…`);
  playBtn.disabled = true;
  dlBtn && (dlBtn.disabled = true);
  try {
    const r = await fetch("/api/play", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        query: $("#q").value.trim(),
        nth: state.selected.nth,
        ep: state.ep,
        quality: els.panel.querySelector(".quality-select").value,
        mode: state.mode,
        player: state.player,
        download,
        thumbnail: download ? (state.selected.thumbnail || "") : undefined,
      })});
    const d = await r.json();
    if (d.ok) {
      setStatus(status, d.stage === "slow" ? "work" : "ok", d.message);
      // If this was a download, bust the downloads cache so the tab
      // picks up the new entry on next visit, and prepend it live if
      // the tab is already open.
      if (download) {
        _downloadsDirty = true;
        // If the Downloads tab is already open, prepend the entry live.
        const dv = document.querySelector("#downloadsView");
        if (dv && dv.style.display !== "none") {
          const listBox = document.querySelector("#downloadsList .list");
          if (listBox) {
            const ep = state.ep;
            const title = $("#q").value.trim();
            const qual = els.panel.querySelector(".quality-select").value;
            const now = new Date().toISOString().replace("T"," ").slice(0,16);
            const el = document.createElement("div");
            el.className = "item";
            el.style.opacity = "1";
            el.innerHTML = `${coverImg(state.selected.thumbnail)}<span class="dl-info" style="flex:1;min-width:0"><span class="name" style="display:block">${escHtml(title)} — ep ${escHtml(String(ep))}</span><span class="meta">⏳ ${escHtml(state.mode)} · ${escHtml(qual)} · ${escHtml(now)}</span></span>`;
            listBox.insertBefore(el, listBox.firstChild);
          }
        }
      }
    } else {
      setStatus(status, "err", d.error || "Playback failed.");
    }
  } catch (err) {
    setStatus(status, "err", "Couldn't reach the server: " + err.message);
  } finally {
    playBtn.disabled = false;
    dlBtn && (dlBtn.disabled = false);
  }
}

async function downloadAll(els, episodes) {
  const { status, playBtn, dlBtn, dlAllBtn } = els;
  dlAllBtn.disabled = true;
  playBtn.disabled = true;
  dlBtn && (dlBtn.disabled = true);

  let done = 0;
  const total = episodes.length;
  setStatus(status, "work", `Downloading ${total} episodes…`);

  for (const ep of episodes) {
    setStatus(status, "work", `Downloading ep ${ep} (${done + 1} / ${total})…`);
    try {
      await fetch("/api/play", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          query: $("#q").value.trim(),
          nth: state.selected.nth,
          ep,
          quality: els.panel.querySelector(".quality-select").value,
          mode: state.mode,
          player: state.player,
          download: true,
          thumbnail: state.selected.thumbnail || "",
        })});
      done++;
    } catch (_) {
      // continue with next episode even if one fails
    }
    // Small delay between requests to be polite to the API.
    await new Promise(r => setTimeout(r, 1000));
  }

  _downloadsDirty = true;
  setStatus(status, "ok", `Queued ${done} of ${total} episodes for download.`);
  playBtn.disabled = !state.ep;
  dlBtn && (dlBtn.disabled = !state.ep);
  dlAllBtn.disabled = false;
}

function setStatus(el, kind, text) {
  el.className = "status" + (kind === "err" ? " err" : kind === "ok" ? " ok" : " work");
  el.textContent = (kind === "work" ? "⏳ " : kind === "ok" ? "▶ " : "⚠ ") + text;
}

async function loadContinue() {
  const box = $("#continueList");
  box.innerHTML = `<div class="spin">Loading history…</div>`;
  try {
    const r = await fetch(`/api/continue?mode=${state.mode}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    renderContinue(d.items);
  } catch (err) {
    box.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
  }
}

function renderContinue(items) {
  const box = $("#continueList");
  if (!items.length) {
    box.innerHTML = `<div class="empty">No watch history yet. Play something from the Search tab.</div>`;
    return;
  }
  box.innerHTML = `<div class="cards"></div>`;
  const grid = box.querySelector(".cards");
  for (const it of items) {
    const card = document.createElement("div");
    card.className = "card";
    const caughtUp = !it.next_ep;
    const prog = caughtUp
      ? `Watched ep ${it.watched}${it.total ? ` · latest ${it.total}` : ""} · caught up`
      : `Watched ep ${it.watched} · next ep ${it.next_ep}${it.total ? ` of ${it.total}` : ""}`;
    card.innerHTML = `
      ${coverImg(it.thumbnail, "cover lg")}
      <div class="body">
        <div class="title"></div>
        <div class="prog">${prog}</div>
        <button class="primary"${caughtUp ? " disabled" : ""}>Resume ep ${it.next_ep ?? it.watched}</button>
        <div class="status"></div>
      </div>`;
    card.querySelector(".title").textContent = it.title;
    const status = card.querySelector(".status");
    card.querySelector("button").addEventListener("click", async (e) => {
      const btn = e.target;
      btn.disabled = true;
      setStatus(status, "work", `Resolving ep ${it.next_ep} via ani-cli…`);
      try {
        const r = await fetch("/api/resume", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ id: it.id, title: it.title, ep: it.next_ep,
                                 mode: it.mode, player: state.player })});
        const d = await r.json();
        if (d.ok) setStatus(status, d.stage === "slow" ? "work" : "ok", d.message);
        else setStatus(status, "err", d.error || "Playback failed.");
      } catch (err) {
        setStatus(status, "err", "Couldn't reach the server: " + err.message);
      } finally {
        btn.disabled = false;
      }
    });
    grid.appendChild(card);
  }
}

let _forYouCache = null;
let _forYouMode = null;

async function loadForYou() {
  const box = $("#forYouList");

  // Serve from cache if mode hasn't changed.
  if (_forYouCache && _forYouMode === state.mode) {
    renderForYou(_forYouCache);
    return;
  }

  box.innerHTML = `<div class="spin">Finding recommendations…</div>`;
  try {
    const r = await fetch(`/api/recommendations?mode=${state.mode}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    _forYouCache = d.items;
    _forYouMode = state.mode;
    renderForYou(d.items);
  } catch (err) {
    _forYouCache = null;
    box.innerHTML = `<div class="empty">Nothing to recommend yet — watch a few episodes first.</div>`;
  }
}

function renderForYou(items) {
  const box = $("#forYouList");
  if (!items.length) {
    box.innerHTML = `<div class="empty">Nothing to recommend yet — watch a few episodes first.</div>`;
    return;
  }
  box.innerHTML = `<div class="cards"></div>`;
  const grid = box.querySelector(".cards");
  for (const it of items) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      ${coverImg(it.thumbnail, "cover lg")}
      <div class="body">
        <div class="title"></div>
        <div class="prog">Because you watched ${escHtml(it.because)}</div>
        <button class="primary">Open in Search</button>
      </div>`;
    card.querySelector(".title").textContent = it.name;
    card.querySelector("button").addEventListener("click", () => {
      // Switch to Search tab with this anime pre-loaded
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelector('[data-tab="search"]').classList.add("active");
      $("#searchView").style.display = "";
      $("#continueView").style.display = "none";
      $("#forYouView").style.display = "none";
      $("#q").value = it.name;
      runSearch().then(() => {
        // Pre-select the first result after search loads
        setTimeout(() => {
          const first = document.querySelector("#results .item");
          if (first) first.click();
        }, 300);
      });
    });
    grid.appendChild(card);
  }
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

let _downloadsDirty = false;
let _downloadsPoll = null;

// Live progress detail shown next to a downloading item: "45% · 2.3MiB/s · ETA 0:42",
// falling back to whatever the downloader gives us (bytes, or nothing).
function dlProgressText(di) {
  if (di.status !== "downloading") return "";
  const bits = [];
  if (typeof di.percent === "number") bits.push(di.percent.toFixed(0) + "%");
  if (di.speed) bits.push(di.speed);
  if (di.eta) bits.push("ETA " + di.eta);
  if (!bits.length && di.downloaded) bits.push(di.downloaded);
  return bits.length ? " · " + bits.join(" · ") : "";
}

// Apply a determinate width when we have a real percent, else leave the bar
// indeterminate (animated) for the "still resolving / no percent" phase.
function applyProgressBar(item, di) {
  const info = item.querySelector(".dl-info");
  let bar = item.querySelector(".prog-bar");
  if (di.status === "downloading") {
    if (!bar) {
      bar = document.createElement("div");
      bar.className = "prog-bar";
      bar.innerHTML = '<div class="fill"></div>';
      info.appendChild(bar);
    }
    const fill = bar.querySelector(".fill");
    if (typeof di.percent === "number") {
      fill.classList.add("det");
      fill.style.width = Math.max(2, Math.min(100, di.percent)) + "%";
    } else {
      fill.classList.remove("det");
      fill.style.width = "";
    }
  } else if (bar) {
    bar.remove();
  }
}

async function loadDownloads() {
  // Load settings for the download-directory input.
  try {
    const sr = await fetch("/api/settings");
    const settings = await sr.json();
    const inp = $("#dlDir");
    if (inp && settings.download_dir) inp.value = settings.download_dir;
  } catch (_) {}

  const box = $("#downloadsList");
  box.innerHTML = `<div class="spin">Loading…</div>`;
  try {
    const r = await fetch("/api/downloads");
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    renderDownloads(d.items);
    _downloadsDirty = false;
    // Poll fast while a download is active (for smooth realtime progress),
    // slow when everything's idle. The cadence re-evaluates every tick.
    scheduleDownloadsPoll(d.items.some(i => i.status === "downloading"));
  } catch (err) {
    box.innerHTML = `<div class="empty">Couldn't load download history.</div>`;
  }
}

function scheduleDownloadsPoll(active) {
  if (_downloadsPoll) clearTimeout(_downloadsPoll);
  _downloadsPoll = setTimeout(refreshDownloadStatus, active ? 1000 : 5000);
}

async function refreshDownloadStatus() {
  if ($("#downloadsView").style.display === "none") {
    if (_downloadsPoll) { clearTimeout(_downloadsPoll); _downloadsPoll = null; }
    return;
  }
  let active = false;
  try {
    const r = await fetch("/api/downloads");
    const d = await r.json();
    if (d.error) { scheduleDownloadsPoll(false); return; }
    active = d.items.some(i => i.status === "downloading");
    const items = document.querySelectorAll("#downloadsList .item");
    // If a new download was queued (or the count otherwise drifted), the
    // incremental index update can't add rows — do a full re-render instead.
    if (_downloadsDirty || items.length !== d.items.length) {
      renderDownloads(d.items);
      _downloadsDirty = false;
      scheduleDownloadsPoll(active);
      return;
    }
    for (let i = 0; i < Math.min(items.length, d.items.length); i++) {
      const di = d.items[i];
      const meta = items[i].querySelector(".meta");
      const icon = di.status === "downloading" ? "⏳" : di.status === "done" ? "✓" : di.status === "failed" ? "✗" : "";
      // Rebuild the meta line cleanly from the record (no string surgery).
      meta.textContent = `${icon} ${di.mode} · ${di.quality} · ${di.time}${dlProgressText(di)}`;
      meta.classList.toggle("failed", di.status === "failed");
      items[i].style.opacity = di.status === "done" ? "0.6" : di.status === "failed" ? "0.8" : "1";
      const info = items[i].querySelector(".dl-info");
      applyProgressBar(items[i], di);
      // Failed downloads get an explanatory note instead of silently
      // looking the same as a finished one.
      let note = items[i].querySelector(".dl-note");
      if (di.status === "failed" && !note) {
        note = document.createElement("div");
        note.className = "dl-note";
        note.textContent = "No file found — this download may have failed. Try again from Search.";
        info.appendChild(note);
      } else if (di.status !== "failed" && note) {
        note.remove();
      }
      // Files matched after the initial render (e.g. the download finished
      // mid-poll) should get Play buttons too, not just on first load.
      const files = di.files || [];
      let filesBox = items[i].querySelector(".dl-files");
      const knownPaths = filesBox
        ? [...filesBox.querySelectorAll(".play-file-btn")].map(b => b.dataset.path)
        : [];
      if (files.length && files.join("|") !== knownPaths.join("|")) {
        if (!filesBox) {
          filesBox = document.createElement("div");
          filesBox.className = "dl-files";
          info.appendChild(filesBox);
        }
        filesBox.innerHTML = files.map(f =>
          `<button class="play-file-btn" data-path="${escHtml(f)}" style="font-size:11px;padding:4px 8px;margin-right:4px;margin-top:6px">▶ ${escHtml(f.split('/').pop().slice(0,30))}</button>`
        ).join("");
        wirePlayFileButtons(filesBox);
      }
    }
  } catch (_) {}
  scheduleDownloadsPoll(active);
}

function wirePlayFileButtons(scope) {
  scope.querySelectorAll(".play-file-btn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      const path = btn.dataset.path;
      btn.disabled = true;
      btn.textContent = "…";
      try {
        const r = await fetch("/api/play-file", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({path, player: state.player}),
        });
        const d = await r.json();
        btn.textContent = d.ok ? "▶" : "✗";
      } catch (_) {
        btn.textContent = "✗";
      }
      setTimeout(() => { btn.disabled = false; }, 2000);
    });
  });
}

function renderDownloads(items) {
  const box = $("#downloadsList");
  if (!items.length) {
    box.innerHTML = `<div class="empty">Nothing downloaded yet. Search for an anime, pick an episode, and click Download.</div>`;
    return;
  }
  box.innerHTML = `<div class="list"></div>`;
  const list = box.querySelector(".list");
  for (const d of items) {
    const el = document.createElement("div");
    el.className = "item";
    const files = d.files || [];
    const statusIcon = d.status === "downloading" ? "⏳" : d.status === "done" ? "✓" : d.status === "failed" ? "✗" : "";
    const playBtns = (files || []).map(f =>
      `<button class="play-file-btn" data-path="${escHtml(f)}" style="font-size:11px;padding:4px 8px;margin-right:4px;margin-top:6px">▶ ${escHtml(f.split('/').pop().slice(0,30))}</button>`
    ).join("");
    // The bar is determinate when we have a real percent, else indeterminate
    // (covers the "still resolving the stream" phase before a percent exists).
    const pct = (d.status === "downloading" && typeof d.percent === "number")
      ? Math.max(2, Math.min(100, d.percent)) : null;
    const bar = d.status === "downloading"
      ? `<div class="prog-bar"><div class="fill${pct !== null ? " det" : ""}"${pct !== null ? ` style="width:${pct}%"` : ""}></div></div>`
      : "";
    const note = d.status === "failed"
      ? `<div class="dl-note">No file found — this download may have failed. Try again from Search.</div>`
      : "";
    // Play buttons and the progress bar live outside .meta on purpose —
    // refreshDownloadStatus() rewrites .meta's text on every poll, which
    // would otherwise wipe out any buttons placed inside it.
    el.innerHTML = `
      ${coverImg(d.thumbnail)}
      <span class="dl-info" style="flex:1;min-width:0">
        <span class="name" style="display:block">${escHtml(d.title)} — ep ${escHtml(String(d.ep))}</span>
        <span class="meta${d.status === "failed" ? " failed" : ""}">${statusIcon} ${escHtml(d.mode)} · ${escHtml(d.quality)} · ${escHtml(d.time)}${dlProgressText(d)}</span>
        ${bar}
        ${note}
        ${playBtns ? `<div class="dl-files">${playBtns}</div>` : ""}
      </span>`;
    el.title = files.length ? `Files: ${files.join(', ')}` : `Saved to: ${d.dir}`;
    el.style.opacity = d.status === "done" ? "0.6" : d.status === "failed" ? "0.8" : "1";
    list.appendChild(el);
  }
  wirePlayFileButtons(list);
  box.insertAdjacentHTML("beforeend",
    `<div class="hint" style="margin-top:12px">Files saved to <code>${escHtml(items[0].dir)}</code> (or <code>$ANI_CLI_DOWNLOAD_DIR</code> if set).</div>`);
}
</script>
