name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Search for "..."
        2. Click ...
        3. ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 14.5 / Ubuntu 24.04 / ...
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Output of `python3 --version` and `ani-cli -V`
      placeholder: Python 3.12.3, ani-cli 4.14.1
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Server log
      description: Terminal output of `python3 server.py` around the error.
      render: shell
