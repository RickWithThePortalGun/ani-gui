name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile (no syntax errors)
        run: python -m py_compile ani_gui/server.py

      - name: Ruff (lint)
        run: |
          pip install ruff
          ruff check .

      - name: ShellCheck launcher
        uses: ludeeus/action-shellcheck@master
        with:
          additional_files: ani-gui
